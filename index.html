<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
		/>
		<link rel="stylesheet" href="./css/style.css" />
		<link
			rel="shortcut icon"
			href="./assets/icons/favicon.png"
			type="image/x-icon"
		/>
		<script defer src="./js/main.js"></script>
		<title>GoalHub</title>
	</head>
	<body>
		<header>
			<h1 class="header animate__animated animate__bounceInUp">
				GoalHub.
			</h1>
		</header>
		<main class="main">
			<section class="form">
				<input
					type="text"
					class="form__input"
					placeholder="Your Goal Here..."
				/>
				<button class="form__submit submit">
					<span>submit</span>
				</button>
			</section>

			<section class="filter">
				<select class="filter__options">
					<option value="goal" selected>show all</option>
					<option value="achieved">achieved</option>
					<option value="progress">in progress</option>
				</select>
			</section>

			<section class="goals-list">
				<article class="goal--empty">Your Goals Will Go Here</article>
			</section>
		</main>

		<footer class="main-footer">
			<small>To-Do App by Chester Alejandro | &copy; 2021.</small>
		</footer>
	</body>
</html>
