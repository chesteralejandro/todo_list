<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
		/>
		<link rel="stylesheet" href="./css/style.css" />
		<link
			rel="shortcut icon"
			href="./assets/icons/favicon.png"
			type="image/x-icon"
		/>
		<title>GoalHub</title>
	</head>
	<body>
		<main class="todo">
			<h1 class="todo__header animate__animated animate__bounceInUp">
				GoalHub
			</h1>
			<div class="todo__form">
				<input
					type="text"
					class="todo__input"
					placeholder="I am going to..."
					maxlength="55"
				/>
				<button class="todo__submit submit">
					<i class="fas fa-th-list"></i>
				</button>
			</div>
			<select class="todo__filter">
				<option value="all" selected>SHOW ALL</option>
				<option value="complete">SHOW COMPLETED</option>
				<option value="working">SHOW WORKING ON</option>
			</select>
			<section class="todo__area">
				<!-- <div class="todo__list">
                <p class="todo__text">Support my mom.</p>
                <button class="todo__button done">
                    <i class="fas fa-check"></i>
                </button>
                <button class="todo__button delete">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div> -->
			</section>
		</main>
		<footer>
			<small>To-Do App by Chester Alejandro | &copy; 2021.</small>
		</footer>
		<script src="./js/main.js"></script>
	</body>
</html>
